# LLaMA-Factory training config for Aasaan student model.
#
# Run via:
#   llamafactory-cli train configs/lora.yaml
#
# Or via run.py with --use-llamafactory flag.
#
# Replaces our hand-rolled train.py. Free wins from this swap:
#   - FlashAttention-2 enabled by default
#   - NEFTune noise injection (proven +2-5pp on instruction-tuned models)
#   - Better default learning rate scheduling
#   - Quantized training paths (QLoRA) if needed for memory pressure
#   - Reproducible config via single YAML file
#
# Dataset is registered in dataset_info.json (auto-generated by run.py
# when --use-llamafactory is set). Format: alpaca-style JSON list of
# {instruction, input, output} which is exactly what curriculum.py emits.

### model
model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: q_proj,k_proj,v_proj,o_proj,gate_proj,up_proj,down_proj

### dataset
dataset: aasaan_curriculum   # registered in data/dataset_info.json
template: llama3
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 4
dataloader_num_workers: 2

### output
output_dir: output_llamafactory/adapter
logging_steps: 20
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
flash_attn: fa2
neftune_noise_alpha: 5
